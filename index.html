<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bank App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="container">
    <h1>🏦 Login</h1>

    <input type="text" id="loginUser" placeholder="Username">
    <input type="password" id="loginPass" placeholder="Password">

    <button onclick="login()">Login</button>
    <button onclick="showRegister()">Create Account</button>
</div>

<!-- REGISTER -->
<div id="registerPage" class="container hidden">
    <h1>📝 Register</h1>

    <input type="text" id="regUser" placeholder="Username">
    <input type="password" id="regPass" placeholder="Password">
    <input type="password" id="regPin" placeholder="4-digit PIN">

    <button onclick="register()">Register</button>
    <button onclick="showLogin()">Back</button>
</div>

<!-- APP -->
<div id="appPage" class="container hidden">

    <h1>🏦 My Bank</h1>

    <img id="avatar" src="https://i.imgur.com/0y0y0y0.png" width="60">

    <input type="text" id="avatarUrl" placeholder="Profile image URL">
    <button onclick="saveAvatar()">Save Avatar</button>

    <button onclick="toggleDark()">🌙 Dark Mode</button>

    <p>Welcome, <span id="userDisplay"></span></p>

    <div class="balance">
        <h2>Balance</h2>
        <p id="balance">0</p>
    </div>

    <button onclick="toggleBalance()">👁 Hide/Show Balance</button>

    <input type="number" id="amount" placeholder="Enter amount">

    <button onclick="deposit()">Deposit</button>
    <button onclick="withdraw()">Withdraw</button>

    <!-- TRANSFER -->
    <h3>Transfer Money</h3>

    <input type="text" id="toUser" placeholder="Receiver username">
    <input type="number" id="transferAmount" placeholder="Amount">

    <button onclick="transfer()">Send Money</button>

    <!-- HISTORY -->
    <div class="history">
        <h2>Transactions</h2>
        <ul id="historyList"></ul>
        <button onclick="clearHistory()" class="clear-btn">Clear History</button>
    </div>

    <button onclick="logout()" class="logout-btn">Logout</button>

</div>

<script src="script.js"></script>
</body>
</html>
